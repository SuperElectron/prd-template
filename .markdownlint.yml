# Relaxed rules for PRD documents
default: true
MD013: false           # Line length — PRDs have long sentences
MD032: false           # Blanks around lists — too strict for mixed content
MD033: false           # Inline HTML — needed for some table formatting
MD040: false           # Fenced code language — not always relevant in docs
MD041: false           # First line heading — templates have frontmatter-style headers
MD060: false           # Table column spacing — compact tables are fine
MD024:
  siblings_only: true  # Allow duplicate headings in different sections
