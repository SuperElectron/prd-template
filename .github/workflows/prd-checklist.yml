name: Document Checks

on:
  pull_request:
    paths:
      - 'prds/**.md'
      - 'decisions/**.md'
      - 'research/**.md'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate file naming convention
        run: |
          errors=0
          changed_docs=$(git diff --name-only origin/main...HEAD | grep -E '^(prds|decisions|research)/.*\.md$' | grep -v '\.gitkeep' || true)

          if [ -z "$changed_docs" ]; then
            echo "No document files changed."
            exit 0
          fi

          for file in $changed_docs; do
            basename=$(basename "$file")
            if ! echo "$basename" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}_[a-z0-9-]+\.md$'; then
              echo "::error file=$file::Filename must follow YYYY-MM-DD_short-description.md convention (e.g., 2024-03-15_my-feature.md)"
              errors=1
            fi
          done

          if [ "$errors" -eq 1 ]; then
            exit 1
          fi

      - name: Validate PRD structure
        run: |
          changed_prds=$(git diff --name-only origin/main...HEAD | grep '^prds/.*\.md$' || true)

          if [ -z "$changed_prds" ]; then
            echo "No PRD files changed."
            exit 0
          fi

          for file in $changed_prds; do
            echo "Checking $file..."
            grep -qi 'status:' "$file" || echo "::warning file=$file::Missing Status field"
            grep -qi '## .*context\|## .*the.*why' "$file" || echo "::warning file=$file::Missing Context section"
            grep -qi '## .*job.stor' "$file" || echo "::warning file=$file::Missing Job Stories section"
            grep -qi '## .*success.metric' "$file" || echo "::warning file=$file::Missing Success Metrics section"
            grep -qi '## .*scope' "$file" || echo "::warning file=$file::Missing Scope section"
          done
